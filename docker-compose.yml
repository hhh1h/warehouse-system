version: "3.8"

services:
  # MySQL 数据库服务
  mysql:
    image: mysql:8.0
    container_name: warehouse-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-123456}
      MYSQL_DATABASE: warehouse
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD:-123456}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - warehouse-net

  # 后端服务
  backend:
    build: ./backend
    container_name: warehouse-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      JWT_SECRET: ${JWT_SECRET:-warehouse-system-jwt-secret-key-2024}
      AI_API_KEY: ${AI_API_KEY:-sk-your-api-key-here}
      ALERT_LOW_STOCK_THRESHOLD: ${ALERT_LOW_STOCK_THRESHOLD:-10}
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/user/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - warehouse-net

  # 前端服务
  frontend:
    build: ./frontend
    container_name: warehouse-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    networks:
      - warehouse-net

volumes:
  mysql_data:

networks:
  warehouse-net:
    driver: bridge
