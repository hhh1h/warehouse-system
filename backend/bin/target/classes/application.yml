server:
  port: 9090
  address: 0.0.0.0

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/warehouse?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=GMT%2b8&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
  web:
    resources:
      static-locations: classpath:/static/, file:../frontend/dist/

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

ai:
  api-key: ${AI_API_KEY}
  model: deepseek-chat
  base-url: https://api.deepseek.com/v1

alert:
  low-stock-threshold: ${ALERT_LOW_STOCK_THRESHOLD:10}
